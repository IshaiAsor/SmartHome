name: ESP32 Firmware CI/CD

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'ESP32Code/**'

jobs:
  build-and-upload-staging:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Generate a new Tag (Auto-increment) matching your web-app style
      - name: Bump version and push tag
        id: tag_version
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Build Firmware
        run: |
          cd ESP32Code
          pio run -e esp32s3_mini-prod

      - name: Upload to Staging OTA Manager
        run: |
          VERSION=${{ steps.tag_version.outputs.new_tag }}
          curl -X POST https://ota.iotiotstg.duckdns.org/release \
            -F "deviceType=ESP32_SmartOutlet" \
            -F "version=$VERSION" \
            -F "releaseNotes=Automated build for $VERSION" \
            -F "firmware=@ESP32Code/.pio/build/esp32s3_mini-prod/firmware.bin"

  register-freight:
    needs: build-and-upload-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: IshaiAsor/oci-k3s-gitops
          token: ${{ secrets.GITOPS_PAT }}
      
      - name: Update Firmware Version for Kargo
        run: |
          VERSION=${{ needs.build-and-upload-staging.outputs.new_tag }}
          # Note: We need to expose the tag from the previous job
          echo $VERSION > firmware-version.txt
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add firmware-version.txt
          git commit -m "chore: new firmware freight $VERSION"
          git push
