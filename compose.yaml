services:
  # EMQX MQTT Broker
  emqx:
    image: emqx/emqx:5.6.0
    container_name: emqx
    depends_on:
      - postgres
    ports:
      - '0.0.0.0:1883:1883' # Standard MQTT
      - '0.0.0.0:8883:8883' # Secure MQTT (MQTTS)
      - '0.0.0.0:18083:18083' # Dashboard
    environment:
      - EMQX_NODE_NAME=emqx@127.0.0.1
      # ----------------------------------------
      # Listeners
      - EMQX_LISTENERS__SSL__DEFAULT__BIND=8883
      - EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__CACERTFILE=/opt/emqx/etc/certs/ca.pem
      - EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__CERTFILE=/opt/emqx/etc/certs/server.pem
      - EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__KEYFILE=/opt/emqx/etc/certs/server.key
      - EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__VERIFY=verify_none
      - EMQX_LISTENERS__WSS__DEFAULT__ENABLE=false
      # ----------------------------------------
      # Auth 1: JWT (For ESP Devices)
      # ----------------------------------------
      - EMQX_AUTHENTICATION__1__MECHANISM=jwt
      - EMQX_AUTHENTICATION__1__USE_JWKS=false
      - EMQX_AUTHENTICATION__1__ALGORITHM=hmac-based
      - EMQX_AUTHENTICATION__1__SECRET=${JWT_SECRET}
      - EMQX_AUTHENTICATION__1__SECRET_BASE64_ENCODED=false
      # ----------------------------------------
      # Auth 2: PostgreSQL (For TS App / Humans)
      # ----------------------------------------
      - EMQX_AUTHENTICATION__2__MECHANISM=password_based
      - EMQX_AUTHENTICATION__2__BACKEND=postgresql
      - EMQX_AUTHENTICATION__2__SERVER=postgres:5432
      - EMQX_AUTHENTICATION__2__DATABASE=${DB_NAME:-emqx_data}
      - EMQX_AUTHENTICATION__2__USERNAME=${EMQX_DB_USERNAME}
      - EMQX_AUTHENTICATION__2__PASSWORD=${EMQX_DB_PASSWORD}
      - EMQX_AUTHENTICATION__2__QUERY=SELECT password_hash, is_superuser FROM mqtt_user WHERE username = $${username} LIMIT 1
      - EMQX_AUTHENTICATION__2__PASSWORD_HASH_ALGORITHM__NAME=bcrypt
      # --- ACL / Authorization Setup ---
      - EMQX_AUTHORIZATION__NO_MATCH=deny
      - EMQX_AUTHORIZATION__SOURCES__1__TYPE=file
      - EMQX_AUTHORIZATION__SOURCES__1__ENABLE=true
      - EMQX_AUTHORIZATION__SOURCES__1__PATH=/opt/emqx/etc/acl.conf
      # Default admin dashboard credentials (admin / public)
      - EMQX_DASHBOARD__DEFAULT_USERNAME=${EMQX_DASHBOARD_USERNAME}
      - EMQX_DASHBOARD__DEFAULT_PASSWORD=${EMQX_DASHBOARD_PASSWORD}
    volumes:
      - ./certs:/opt/emqx/etc/certs:ro
      - ./acl.conf:/opt/emqx/etc/acl.conf

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME:-emqx_data}
      - BACKEND_DB_USER=${BACKEND_DB_USER}
      - BACKEND_DB_PASSWORD=${BACKEND_DB_PASSWORD}
      - EMQX_DB_USERNAME=${EMQX_DB_USERNAME}
      - EMQX_DB_PASSWORD=${EMQX_DB_PASSWORD}
      - MQTT_APP_USERNAME=${MQTT_APP_USERNAME}
      - MQTT_APP_PASSWORD=${MQTT_APP_PASSWORD}
      - TZ=Asia/Jerusalem
      - PGTZ=Asia/Jerusalem
    ports:
      - '5432:5432'
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./local-sql:/docker-entrypoint-initdb.d:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ${DB_NAME:-emqx_data}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # Adminer (Database Management Tool)
  adminer:
    image: adminer:latest
    container_name: adminer_ui
    ports:
      - '8080:8080' # Access via http://localhost:8080
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 64M
    restart: always
    depends_on:
      postgres:
        condition: service_healthy

  # Valkey (Redis-compatible cache — drop-in replacement for Redis)
  cache:
    image: valkey/valkey:8-alpine
    container_name: redis_cache
    command: >
      valkey-server
      --maxmemory 256mb
      --maxmemory-policy volatile-lru
      --appendonly yes
      --user ${REDIS_USER} on ">${REDIS_PASSWORD}" ~* +@all
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: always

  # ML Router — VLM + LLM inference (HTTP + RabbitMQ consumer)
  ml-router:
    build:
      context: ./services/ml-router
    container_name: ml-router
    ports:
      - '3002:3002'
    environment:
      - PORT=3002
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - ONNX_MODELS_DIR=/app/models
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./models:/app/models:ro
    depends_on:
      - rabbitmq
    restart: always

  # RabbitMQ message broker (for Lattice workers / pipeline)
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    ports:
      - '5672:5672'    # AMQP
      - '15672:15672'  # Management UI → http://localhost:15672
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: always

  # OTA Manager Service
  ota-manager:
    build:
      context: ./ota-manager
    container_name: ota-manager
    ports:
      - '3001:3000'
    environment:
      - PORT=3000
      - MQTT_INTERNAL_HOST=emqx
      - MQTT_SERVER_NAME=emqx
      - MQTT_PORT=8883
      - MQTT_CA_CERT_PATH=/app/certs/ca.pem
      - MQTT_VALIDATE_CERT=false
      - MQTT_APP_USERNAME=${MQTT_APP_USERNAME}
      - MQTT_APP_PASSWORD=${MQTT_APP_PASSWORD}
      - FIRMWARE_PATH=/app/firmware
    volumes:
      - ./firmware-storage:/app/firmware
      - ./certs:/app/certs:ro
    depends_on:
      - emqx
    restart: always

  # VLM Server — plant health AI inference
  vlm-server:
    build:
      context: ./vlm-server
    container_name: vlm-server
    ports:
      - '3002:3000'
    restart: always

  # Prisma migrations — run once on first setup or after schema changes:
  #   docker compose run --rm migrate
  migrate:
    build:
      context: ./prisma
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@postgres:5432/${DB_NAME:-emqx_data}?sslmode=disable
      - MQTT_APP_USERNAME=${MQTT_APP_USERNAME}
      - MQTT_APP_PASSWORD=${MQTT_APP_PASSWORD}
      - OWNER_EMAIL=${OWNER_EMAIL}
      - OWNER_PASSWORD=${OWNER_PASSWORD}
      - OWNER_USERNAME=${OWNER_USERNAME}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrate

  # Regenerate Prisma client after schema changes (run from host, not inside Docker):
  #   docker compose run --rm generate
  generate:
    build:
      context: ./prisma
      dockerfile: Dockerfile     
    command: npx prisma generate
    profiles:
      - generate

volumes:
  emqx-data:
  pg-data:
  redis_data:
  rabbitmq_data:
