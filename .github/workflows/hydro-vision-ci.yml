name: Build and Push Hydro Vision Image

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'hydro-vision-service/**'

jobs:
  build-and-push-hydro-vision:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version and push tag
        id: tag_version
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

      - name: Build and push Hydro Vision Image
        uses: docker/build-push-action@v5
        with:
          context: ./hydro-vision-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/ishaiasor/smarthome-hydro-vision:${{ steps.tag_version.outputs.new_tag }}
            ghcr.io/ishaiasor/smarthome-hydro-vision:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
