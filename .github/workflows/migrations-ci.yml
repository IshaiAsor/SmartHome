name: Build and Push Migrations Image

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'migrations/**'
      - 'Dockerfile.migrations'

jobs:
  build-and-push-migrations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version and push tag
        id: tag_version
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

      - name: Generate Atlas Hash
        run: |
          docker run --rm -v ${{ github.workspace }}/migrations:/migrations arigaio/atlas:latest migrate hash --dir "file:///migrations"

      - name: Build and push Migrations Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.migrations
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/ishaiasor/smarthome-migrations:${{ steps.tag_version.outputs.new_tag }}
            ghcr.io/ishaiasor/smarthome-migrations:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
