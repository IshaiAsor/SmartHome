name: ESP32 Firmware Production Promotion

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Firmware version to promote to production'
        required: true

jobs:
  promote-to-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Download from Staging
        run: |
          curl -L https://ota.iotiotstg.duckdns.org/download/ESP32_SmartOutlet/${{ github.event.inputs.version }}.bin -o firmware.bin

      - name: Upload to Production OTA Manager
        run: |
          curl -X POST https://ota.iotiot.duckdns.org/release \
            -F "firmware=@firmware.bin" \
            -F "deviceType=ESP32_SmartOutlet" \
            -F "version=${{ github.event.inputs.version }}" \
            -F "releaseNotes=Promoted from Staging: ${{ github.event.inputs.version }}"
