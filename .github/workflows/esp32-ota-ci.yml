name: ESP32 Firmware CI/CD

on:
  push:
    branches: ['main', 'master']
    paths:
      - 'ESP32Code/**'

jobs:
  # Build all production firmware configurations in parallel
  build-firmware-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - env-name: esp32s3_mini-prod
            device-type: ESP32S3_Mini
          - env-name: 4d_systems_esp32s3_gen4_r8n16-prod
            device-type: ESP32S3_MultiSocket
          - env-name: esp32wrover_e-prod
            device-type: ESP32S3_Wrover
          - env-name: freenove_wrover_cam-prod
            device-type: ESP32_WroverCam
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Build firmware for ${{ matrix.device-type }}
        run: |
          cd ESP32Code
          pio run -e ${{ matrix.env-name }}

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.device-type }}
          path: ESP32Code/.pio/build/${{ matrix.env-name }}/firmware.bin
          retention-days: 1

  # Consolidate all firmware variants into a single OCI image
  build-and-push-image:
    needs: build-firmware-matrix
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: firmware-artifacts

      - name: Prepare firmware for Docker build
        run: |
          mkdir -p firmware-staging
          for device_dir in firmware-artifacts/firmware-*/; do
            device_name=$(basename "$device_dir" | sed 's/firmware-//')
            mkdir -p "firmware-staging/$device_name"
            cp "$device_dir/firmware.bin" "firmware-staging/$device_name/"
          done
          cp ESP32Code/Dockerfile.firmware firmware-staging/Dockerfile
          ls -la firmware-staging/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-variant firmware image
        uses: docker/build-push-action@v5
        with:
          context: firmware-staging
          file: firmware-staging/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/ishaiasor/smarthome-firmware:${{ steps.tag_version.outputs.new_tag }}
            ghcr.io/ishaiasor/smarthome-firmware:latest
          build-args: |
            VERSION=${{ steps.tag_version.outputs.new_tag }}

      - name: Upload firmware variants to OTA Manager
        run: |
          VERSION="${{ steps.tag_version.outputs.new_tag }}"
          for device_dir in firmware-staging/*/; do
            device_type=$(basename "$device_dir")
            firmware_file="$device_dir/firmware.bin"
            echo "Uploading $device_type firmware v$VERSION to OTA Manager..."
            curl -X POST https://ota.iotiotstg.duckdns.org/release \
              -F "deviceType=$device_type" \
              -F "version=$VERSION" \
              -F "releaseNotes=Multi-device build v$VERSION" \
              -F "firmware=@$firmware_file"
          done

