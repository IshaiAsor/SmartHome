<nav class="navbar">

  <!-- Brand -->
  <a class="nav-brand" routerLink="/">
    <mat-icon class="brand-icon">hub</mat-icon>
    <span class="brand-text">SmartHome</span>
  </a>

  <!-- Nav links (authenticated only) -->
  @if (authService.getCurrentUser(); as user) {
    <div class="nav-sep"></div>
    <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">
      <mat-icon>dashboard</mat-icon>
      <span>Dashboard</span>
    </a>
    <a class="nav-link" routerLink="/mgmt/devices" routerLinkActive="active">
      <mat-icon>device_hub</mat-icon>
      <span>Devices</span>
    </a>
    <a class="nav-link" routerLink="/rules" routerLinkActive="active">
      <mat-icon>auto_awesome</mat-icon>
      <span>Rules</span>
    </a>
    <a class="nav-link" routerLink="/device-config" routerLinkActive="active">
      <mat-icon>settings_suggest</mat-icon>
      <span>Device Config</span>
    </a>
    @if (user.role === 'admin') {
      <a class="nav-link" routerLink="/admin/templates" routerLinkActive="active">
        <mat-icon>build</mat-icon>
        <span>Templates</span>
      </a>
    }
  }

  <div class="spacer"></div>

  <!-- Right: authenticated / guest -->
  @if (authService.getCurrentUser(); as user) {
    <div class="user-section">
      <span class="user-name">{{ user.username }}</span>
      <button mat-icon-button [matMenuTriggerFor]="profileMenu" class="profile-btn" disableRipple>
        @if (user.profileImage) {
          <img [src]="user.profileImage" class="nav-profile-pic" alt="Profile picture">
        } @else {
          <mat-icon>account_circle</mat-icon>
        }
      </button>
    </div>

    <mat-menu #profileMenu="matMenu">
      <button mat-menu-item>
        <mat-icon>person</mat-icon>
        <span>My Profile</span>
      </button>
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  } @else {
    <a class="nav-link" routerLink="/login">
      <mat-icon>login</mat-icon>
      <span>Sign in</span>
    </a>
  }

</nav>

<div class="page-container">
  <router-outlet></router-outlet>
</div>
