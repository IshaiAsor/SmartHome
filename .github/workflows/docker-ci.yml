name: Build and Push Unified Image

on:
  push:
    branches: [ "main", "master" ] # Listens for both just to be safe!

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # 1. Checkout the code FIRST
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up the ARM emulator
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. Set up the multi-architecture builder
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Authenticate with GHCR
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Generate a new Tag (Auto-increment)
      - name: Bump version and push tag
        id: tag_version
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

      # 6. Build and Push Server Image
      - name: Build and push Server Image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/ishaiasor/smarthome-server:${{ steps.tag_version.outputs.new_tag }}
            ghcr.io/ishaiasor/smarthome-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 7. Generate Atlas Hash and Build Migrations Image
      - name: Generate Atlas Hash
        run: |
          docker run --rm -v ${{ github.workspace }}/migrations:/migrations arigaio/atlas:latest migrate hash --dir "file:///migrations"

      - name: Build and push Migrations Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.migrations
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/ishaiasor/smarthome-migrations:${{ steps.tag_version.outputs.new_tag }}
            ghcr.io/ishaiasor/smarthome-migrations:latest

      # 8. Build and Push OTA Manager Image
      - name: Build and push OTA Manager Image
        uses: docker/build-push-action@v5
        with:
          context: ./ota-manager
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/ishaiasor/smarthome-ota-manager:${{ steps.tag_version.outputs.new_tag }}
            ghcr.io/ishaiasor/smarthome-ota-manager:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
