name: Build and Push Unified Image

on:
  push:
    branches: [ "main", "master" ] # Listens for both just to be safe!

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the code FIRST
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up the ARM emulator
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. Set up the multi-architecture builder
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Authenticate with Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 5. Build and Push (Watch the indentation carefully here!)
      - name: Build and push Unified Image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/smarthome-server:${{ github.sha }}

      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: IshaiAsor/oci-k3s-gitops # <--- Change this to your GitOps repo!
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-repo

      - name: Update Image Tag in GitOps Repo
        run: |
          cd gitops-repo
          
          # Find the deployment.yaml and swap the image tag
          # Make sure the path matches where your web-app deployment lives in the GitOps repo
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/smarthome-server:.*|image: ${{ secrets.DOCKER_USERNAME }}/smarthome-server:${{ github.sha }}|g" apps/web-app/deployment.yaml
          
          # Commit and push the change to the GitOps repo
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add apps/web-app/deployment.yaml
          git commit -m "chore: auto-update web-app image to ${{ github.sha }}"
          git push