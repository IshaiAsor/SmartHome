name: Build and Push ML Router Image

on:
  push:
    branches: ['master', 'v2.2']
    paths:
      - 'services/ml-router/**'
      - 'packages/**'
      - 'package.json'
      - 'tsconfig.base.json'

jobs:
  build-and-push-ml-router:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          tags: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version and push tag
        id: tag_version
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BRANCH: master
          DEFAULT_BUMP: patch

      - name: Build and push ML Router Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/ml-router/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/ishaiasor/lattice-ml-router:${{ steps.tag_version.outputs.new_tag }}
            ghcr.io/ishaiasor/lattice-ml-router:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
