<div class="camera-display" (click)="openFullscreen()" (keydown.enter)="openFullscreen()" tabindex="0" role="button" [matTooltip]="'Click to expand'">
  @if (action().state) {
  <img [src]="'data:image/jpeg;base64,' + action().state" alt="Camera" class="camera-img" />
  } @else {
  <div class="camera-placeholder">
    <span class="material-symbols-outlined">photo_camera</span>
    <span>No image yet</span>
  </div>
  }
</div>
