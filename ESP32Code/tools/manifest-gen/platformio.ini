; Host (desktop) build of the capability manifest generator.
;
; This is a self-contained `native` PlatformIO project so it never tries to compile the
; ESP32 firmware sources. It includes the firmware's pure CapabilityRegistry +
; CapabilitySerializer (via -I ../../src) and a tiny Arduino.h shim (via -I include) that
; supplies only OUTPUT/INPUT.
;
; Per-device-type identity is injected by tools/generate-manifests.mjs through the
; PLATFORMIO_BUILD_FLAGS env var, e.g.:
;   -DGEN_DEVICE_TYPE=ESP32S3_MINI -DGEN_DEVICE_VERSION=v2.0.138 [-DHAS_CAMERA]
;
; Requires a host C++ compiler (gcc/clang/MSVC) — standard for PlatformIO `native`.
[env:gen]
platform = native
build_flags =
    -std=gnu++17
    -I ../../src
    -I include
lib_deps =
    bblanchon/ArduinoJson@^7.2.2
