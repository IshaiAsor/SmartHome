name: Build and Push Digest Service Image

on:
  push:
    branches: ['master', 'v2.2']
    paths:
      - 'services/digest-service/**'
      - 'packages/**'
      - 'prisma/**'
      - 'package.json'
      - 'tsconfig.base.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Bump version and push tag
        id: tag_version
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BRANCH: master
          DEFAULT_BUMP: patch

  build:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            platform-pair: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            platform-pair: linux-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/digest-service/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=ghcr.io/ishaiasor/lattice-digest-service,push-by-digest=true,name-canonical=true
          cache-from: type=gha,scope=${{ matrix.platform-pair }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform-pair }}
      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
      - uses: actions/upload-artifact@v4
        with:
          name: digests-digest-service-${{ matrix.platform-pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-digest-service-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ghcr.io/ishaiasor/lattice-digest-service:${{ needs.prepare.outputs.new_tag }} \
            -t ghcr.io/ishaiasor/lattice-digest-service:latest \
            $(printf 'ghcr.io/ishaiasor/lattice-digest-service@sha256:%s ' *)
