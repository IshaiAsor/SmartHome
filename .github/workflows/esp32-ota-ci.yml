name: ESP32 Firmware CI/CD

on:
  push:
    branches: ['main', 'master']
    paths:
      - 'ESP32Code/**'

jobs:
  generate-firmware-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Generate firmware matrix from platformio.ini
        id: set-matrix
        run: |
          python - <<'PY'
          import json
          import os
          import re

          text = open('ESP32Code/platformio.ini', encoding='utf-8').read()
          matrix = {'include': []}
          current = None

          for line in text.splitlines():
              section = re.match(r'^\[env:([^\]]+)\]', line)
              if section:
                  if current and current['env-name'].endswith('-prod'):
                      matrix['include'].append(current)
                  current = {
                      'env-name': section.group(1).strip(),
                      'device-type': None,
                  }
                  continue

              if current is None:
                  continue

              # platformio.ini uses escaped quotes: -D DEVICE_TYPE_STR=\"ESP32S3_Mini\"
              device_type_match = re.search(r'DEVICE_TYPE_STR\s*=\s*\\?"?([A-Za-z0-9_]+)', line)
              if device_type_match:
                  current['device-type'] = device_type_match.group(1).strip()

          if current and current['env-name'].endswith('-prod'):
              matrix['include'].append(current)

          for item in matrix['include']:
              if item['device-type'] is None:
                  item['device-type'] = item['env-name'].replace('-prod', '').replace('_', '-')

          matrix_json = json.dumps(matrix)
          print(matrix_json)
          with open('matrix.json', 'w', encoding='utf-8') as f:
              f.write(matrix_json)
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
              out.write(f'matrix<<EOF\n{matrix_json}\nEOF\n')
          PY

      - name: Debug generated matrix
        run: |
          cat matrix.json

      - name: Bump version and push tag
        id: tag_version
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

      - name: Update DEVICE_VERSION_STR in platformio.ini
        if: github.actor != 'github-actions'
        run: |
          export VERSION="${{ steps.tag_version.outputs.new_tag }}"
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          version = os.environ['VERSION']
          path = Path('ESP32Code/platformio.ini')
          text = path.read_text(encoding='utf-8')
          # platformio.ini uses escaped quotes: -D DEVICE_VERSION_STR=\"V1.0.0\"
          new_text = re.sub(r'(-D\s*DEVICE_VERSION_STR\s*=\s*\\")[^\\"]*(\\")', rf'\g<1>{version}\g<2>', text)
          path.write_text(new_text, encoding='utf-8')
          PY

          if ! git diff --quiet -- ESP32Code/platformio.ini; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add ESP32Code/platformio.ini
            git commit -m "chore: update PlatformIO DEVICE_VERSION_STR to ${VERSION}"
            git push
          else
            echo "platformio.ini already contains ${VERSION}"
          fi

  build-firmware-matrix:
    needs: generate-firmware-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      matrix: ${{ fromJson(needs.generate-firmware-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Build firmware for ${{ matrix.device-type }}
        run: |
          cd ESP32Code
          pio run -e ${{ matrix.env-name }}

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.device-type }}
          path: ESP32Code/.pio/build/${{ matrix.env-name }}/firmware.bin
          retention-days: 1

  # Consolidate all firmware variants into a single OCI image
  build-and-push-image:
    needs: [build-firmware-matrix, generate-firmware-matrix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: firmware-artifacts

      - name: Prepare firmware for Docker build
        run: |
          mkdir -p firmware-staging
          for device_dir in firmware-artifacts/firmware-*/; do
            device_name=$(basename "$device_dir" | sed 's/firmware-//')
            mkdir -p "firmware-staging/$device_name"
            cp "$device_dir/firmware.bin" "firmware-staging/$device_name/"
          done
          cp ESP32Code/Dockerfile.firmware firmware-staging/Dockerfile
          ls -la firmware-staging/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-variant firmware image
        uses: docker/build-push-action@v5
        with:
          context: firmware-staging
          file: firmware-staging/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/ishaiasor/smarthome-firmware:${{ needs.generate-firmware-matrix.outputs.new_tag }}
            ghcr.io/ishaiasor/smarthome-firmware:latest
          build-args: |
            VERSION=${{ needs.generate-firmware-matrix.outputs.new_tag }}

      # - name: Upload firmware variants to OTA Manager
