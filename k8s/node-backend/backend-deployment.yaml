# k8s/node-backend/backend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-backend
  namespace: iot-system
spec:
  replicas: 2 # Run two instances for high availability!
  selector:
    matchLabels:
      app: node-backend
  template:
    metadata:
      labels:
        app: node-backend
    spec:
      containers:
      - name: node-backend
        image: your-dockerhub-username/node-backend:latest
        imagePullPolicy: Always
        env:
        # Pointing to the K8s internal services
        - name: MQTT_URL
          value: "mqtt://mosquitto-service:1883"
        - name: DB_HOST
          value: "postgres-service"
        - name: DB_USER
          value: "iot_admin"
        - name: DB_PASSWORD
          value: "super_secret_password"
        ports:
        - containerPort: 3000

---
