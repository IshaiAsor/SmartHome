[env:esp32s3_mini-test]
platform = espressif32
framework = arduino
board = esp32-s3-devkitc-1

; ; Match the 4MB Flash common on Mini/Zero form factors
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
; Fixes the missing file build error
board_build.partitions = ota_partitions.csv


; Crucial flags for native USB CDC Serial monitoring
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MSC_ON_BOOT=0
    -DARDUINO_USB_DFU_ON_BOOT=0
	-D ENV_TEST
lib_deps = 
	knolleary/PubSubClient@^2.8
	adafruit/Adafruit NeoPixel@^1.15.4
	bblanchon/ArduinoJson@^7.2.2
	links2004/WebSockets@^2.7.3
	hideakitai/MQTTPubSubClient@^0.3.2
	ferdiu/ESP32ProvisionToolkit@^1.0.1
	tzapu/WiFiManager@^2.0.17
	paulstoffregen/OneWire@^2.3.8
	milesburton/DallasTemperature@^4.0.6
; Adjust upload and monitor speeds
upload_speed = 921600
monitor_speed = 115200
