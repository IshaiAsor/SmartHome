<div class="dashboard-container">
  <h2>Power Strip Management</h2>
  
  <div class="device-grid">
    <div class="device-card" *ngFor="let device of devices">
      <div class="device-info">
        <h3>{{ device.name }}</h3>
        <span class="status" [class.active]="device.is_on">
          {{ device.is_on ? 'ON' : 'OFF' }}
        </span>
      </div>
      
      <button 
        class="toggle-btn" 
        [class.btn-on]="device.is_on"
        (click)="onToggle(device)">
        {{ device.is_on ? 'Turn Off' : 'Turn On' }}
      </button>
    </div>
  </div>
</div>
