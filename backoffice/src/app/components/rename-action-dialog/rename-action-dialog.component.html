<h2 mat-dialog-title>{{ data.title ?? 'Rename Action' }}</h2>

<mat-dialog-content>
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Name</mat-label>
    <input matInput [formControl]="nameControl" (keyup.enter)="save()" cdkFocusInitial />
    @if (nameControl.invalid) { <mat-error>Name is required</mat-error> }
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" [disabled]="nameControl.invalid" (click)="save()">
    Save
  </button>
</mat-dialog-actions>
