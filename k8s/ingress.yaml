# k8s/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: iot-ingress
  namespace: iot-system
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # Optional: Automatically provision SSL certificates if using cert-manager
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  rules:
  - host: api.your-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: node-backend-service
            port:
              number: 80
  - host: pgadmin.your-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: pgadmin-service # Ensure you have a service defined for pgAdmin
            port:
              number: 80