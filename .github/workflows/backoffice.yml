name: Backoffice CI/CD

on:
  push:
    branches: [master, v2.2]
    paths:
      - 'backoffice/**'
      - '.github/workflows/backoffice.yml'
  pull_request:
    branches: [master, v2.2]
    paths:
      - 'backoffice/**'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backoffice
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backoffice/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backoffice
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backoffice/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npx ng test --watch=false --browsers=ChromeHeadlessNoSandbox

  build-push:
    name: Build & Push
    needs: [lint, test]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/ishaiasor/lattice-backoffice
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: ./backoffice
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy step added in F5.7 once staging overlay includes the backoffice k8s base.
